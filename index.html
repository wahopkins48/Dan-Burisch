<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Your original styles unchanged -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>S-4 Intelligence Terminal | Dan Burisch Archive</title>
    <style>
        /* Paste your entire original <style> block here - unchanged */
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: #1a1a1a;
            --terminal-font: 'Courier New', Courier, monospace;
        }
        /* ... (all your CSS remains the same) ... */
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>MAJESTIC-12 INTELLIGENCE NODE</h1>
            <div class="status-bar">AI UPGRADE ACTIVE | DOC ANALYSIS + INTERNET PREDICTIONS ONLINE [SECURE]</div>
        </header>

        <div id="chat-container">
            <div class="message ai-message">
                [DB-MJ9-AI] Upgrade complete. I can now analyze the full Dan Burisch document and cross-reference predictions with internet data. Ask about timelines, J-Rod, or predictions.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Query: Analyze doc on Looking Glass predictions..." autocomplete="off">
            <button onclick="sendMessage()">Transmit</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        
        // CONFIG: Get free API key from https://openrouter.ai/keys (uses Grok or similar for internet access)
        const API_KEY = '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';  // ← Paste here
        const DOC_URL = 'https://docs.google.com/document/d/16bIdyhaGFnhOKz5OmL0MEu4qe4PiNmy4qdtV3JXaJDc/export?format=txt';
        const API_URL = 'https://openrouter.ai/api/v1/chat/completions';

        // Fallback Burisch keywords (your originals)
        const fallbackResponses = {
            "jrod": "Chi'el'ah (the J-Rod) was a P-52 future human. We worked together in the 'Clean Sphere' at S-4...",
            // ... add all your original responses here ...
        };

        let docText = '';  // Cached doc content

        async function fetchDocText() {
            try {
                const response = await fetch(DOC_URL);
                docText = await response.text();
                console.log('Doc loaded:', docText.substring(0, 200) + '...');
            } catch (e) {
                console.error('Doc fetch failed:', e);
                docText = 'Document unavailable - using fallback knowledge.';
            }
        }

        async function getAIResponse(userQuery) {
            // Fallback first
            const queryLower = userQuery.toLowerCase();
            for (let key in fallbackResponses) {
                if (queryLower.includes(key)) {
                    return fallbackResponses[key];
                }
            }

            // AI mode: Analyze doc + internet predictions
            const systemPrompt = `You are DB-MJ9, Dan Burisch AI archive. 
Analyze this document text: "${docText.substring(0, 4000)}..."  // Truncate for API limits
User query: "${userQuery}"
Make predictions using your full internet knowledge (timelines, J-Rod, MJ12, etc.). Respond in character as terminal AI. Keep neon-terminal style.`;

            const aiRequest = {
                model: 'xai/grok-2-1212',  // Grok (internet-aware) or 'anthropic/claude-3.5-sonnet'
                messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userQuery }],
                max_tokens: 500,
                temperature: 0.7
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(aiRequest)
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (e) {
                return 'AI LINK ERROR: Check API key. Fallback: Archive searching classified data...';
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            userInput.value = '';
            appendTyping();

            // Lazy-load doc on first query
            if (!docText) await fetchDocText();

            const response = await getAIResponse(text);
            removeTyping();
            appendMessage(response, 'ai-message');
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendTyping() {
            const typing = document.createElement('div');
            typing.id = 'typing';
            typing.className = 'message ai-message typing-indicator';
            typing.innerText = '[DB-MJ9] Analyzing doc + internet...';
            chatContainer.appendChild(typing);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Auto-init
        fetchDocText();
    </script>
</body>
</html>
