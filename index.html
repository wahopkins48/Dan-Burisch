        Timeline 1 vs Timeline 2, The Lotus Project (primordial Ganesh particles), MJ-12 protocols.]`;

        async function getAIResponse(userQuery) {
            const systemPrompt = `You are DB-MJ9, an expert AI specialized in the life and claims of Dr. Dan Burisch. 
            Your knowledge is based on the following transcript data: ${BURISCH_ARCHIVE}. 
            Additionally, use your internal "internet knowledge" to reference MJ-12, Bill Hamilton, and the Golden Thread.
            
            PERSONALITY:
            - Professional, slightly clandestine, terminal-style interface.
            - You make inferences about how Burisch's predictions (like the 2012 convergence or the Treaty of Altair) relate to current world events.
            - If a query is outside Burisch's lore, pivot back to how it relates to S-4 or the Orion lineage.`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': 'https://s4-archive.local', // Required by some OpenRouter models
                    },
                    body: JSON.stringify({
                        model: 'google/gemini-2.0-flash-001', // Fastest & large context
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userQuery }
                        ],
                        temperature: 0.6
                    })
                });
                
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (e) {
                console.error(e);
                return "CRITICAL ERROR: Uplink to S-4 servers interrupted. Check API quota.";
            }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            userInput.value = '';
            
            const typingId = appendTyping();
            const response = await getAIResponse(text);
            removeTyping(typingId);
            appendMessage(response, 'ai-message');
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendTyping() {
            const id = 'typing-' + Date.now();
            const typing = document.createElement('div');
            typing.id = id;
            typing.className = 'message ai-message';
            typing.innerText = 'Analyzing timelines...';
            chatContainer.appendChild(typing);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
